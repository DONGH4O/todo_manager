name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop:
    name: ${{ matrix.os }} / Python + React desktop
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            release_platform: windows
          - os: macos-latest
            release_platform: macos

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONUTF8: "1"
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall engine cli gui scripts

      - name: Run Python tests
        run: python -m pytest -q

      - name: CLI and GUI entrypoint smoke
        run: |
          todo --help
          todo-gui --help
          python scripts/ci_cli_smoke.py

      - name: Install React dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate React frontend
        working-directory: frontend
        run: |
          npm run lint
          npm run typecheck
          npm run build
          npm audit --omit=dev

      - name: React desktop release dry-run
        run: |
          python scripts/build.py react
          python scripts/smoke_release.py --platform "${{ matrix.release_platform }}" --release-dir dist/TodoManager --react-only
